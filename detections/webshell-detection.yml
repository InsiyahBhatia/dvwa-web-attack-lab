title: Suspicious Process Spawned by Web Server
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: >
  Detects shell processes or network tools spawned as children of the web server
  process (apache2, nginx, php-fpm), which may indicate web shell execution or
  command injection exploitation.
author: Web Application Pentest Lab
date: 2026/06/11

logsource:
  category: process_creation
  product: linux

detection:
  web_server_parent:
    ParentImage|contains:
      - 'apache2'
      - 'nginx'
      - 'php-fpm'
      - 'php'
      - 'httpd'

  suspicious_child:
    Image|contains:
      - '/bin/bash'
      - '/bin/sh'
      - '/usr/bin/nc'
      - '/usr/bin/ncat'
      - '/usr/bin/python'
      - '/usr/bin/perl'
      - '/usr/bin/curl'
      - '/usr/bin/wget'

  condition: web_server_parent and suspicious_child

level: critical

tags:
  - attack.execution
  - attack.t1059.004
  - attack.t1505.003
